services:
  memgateqa:
    build: .
    ports:
      - "8788:8788"
      - "5173:5173"
    env_file:
      - .env
    environment:
      MEMGATEQA_MOCK: "false"
      VITE_MEMGATEQA_MOCK: "false"
      VITE_COGNEE_PROXY_URL: http://localhost:8788
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/health')"]
      interval: 10s
      timeout: 5s
      retries: 5